<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>behold</title>
    <style>
      :root {
        --bg: #0d1117; --panel: #161b22; --line: #30363d; --fg: #e6edf3; --muted: #8b949e;
        --managed: #3fb950; --foreign: #d29922; --pending: #58a6ff; --edge: #6e7681;
        --degraded: #f85149;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg);
        font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, sans-serif; }
      #app { display: grid; grid-template-columns: 1fr 320px; grid-template-rows: auto 1fr;
        height: 100%; }
      header { grid-column: 1 / 3; padding: 10px 16px; border-bottom: 1px solid var(--line);
        display: flex; align-items: baseline; gap: 12px; }
      header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .3px; }
      header .meta { color: var(--muted); font-size: 12px; }
      #graph { overflow: auto; }
      #inspect { border-left: 1px solid var(--line); background: var(--panel); padding: 14px;
        overflow: auto; }
      #inspect h2 { font-size: 13px; margin: 0 0 8px; color: var(--muted); font-weight: 600;
        text-transform: uppercase; letter-spacing: .5px; }
      #inspect dl { margin: 0; display: grid; grid-template-columns: max-content 1fr; gap: 4px 10px; }
      #inspect dt { color: var(--muted); }
      #inspect dd { margin: 0; word-break: break-all; }
      /* The graph SVG is pinhole's, self-styled (themes, icons, `_status` drift
         colours). behold only adds a selection highlight on the clicked node. */
      #graph svg { max-width: none; }
      .sel rect, .sel path, .sel > rect { stroke: var(--pending) !important; stroke-width: 2.5 !important; }
      .err { padding: 24px; color: var(--foreign); }
      #actions button, #inspect button { background: var(--panel); color: var(--fg); border: 1px solid var(--line);
        border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
      #actions button:hover, #inspect button:hover { border-color: var(--pending); }
      #actions button.approve { border-color: var(--managed); color: var(--managed); }
      #inspect button { border-color: var(--foreign); color: var(--foreign); }
      #pickers select { background: var(--panel); color: var(--fg); border: 1px solid var(--line);
        border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; }
      #pickers select:hover { border-color: var(--pending); }
      #nowline { grid-column: 1 / 3; margin: 0; max-height: 160px; overflow: auto; display: none;
        background: #010409; border-top: 1px solid var(--line); padding: 8px 12px; font: 11px/1.5 ui-monospace, monospace;
        color: var(--fg); white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>behold</h1>
        <span class="meta" id="meta">loading…</span>
        <span id="legend" style="display:none;gap:12px;font-size:11px;align-self:center">
          <span style="color:var(--managed)">● managed</span>
          <span style="color:var(--foreign)">● foreign</span>
          <span style="color:var(--pending)">● pending</span>
        </span>
        <!-- M1.1 (#57): the component DAG's live per-component AWS status —
             a different join than the entity overlay above (component name ->
             CFN stack, not chant's cross-substrate --live --overlay), so it's
             a separate legend rather than reusing #legend's vocabulary. -->
        <span id="component-legend" style="display:none;gap:12px;font-size:11px;align-self:center">
          <span style="color:var(--managed)">● deployed</span>
          <span style="color:var(--foreign)">● stale / drifted</span>
          <span style="color:var(--muted)">● not deployed</span>
        </span>
        <span id="pickers" style="margin-left:auto;display:flex;gap:8px"></span>
        <span id="actions" style="display:flex;gap:8px"></span>
        <a href="/lanes" style="color:var(--pending);text-decoration:none;font-size:12px;align-self:center">lanes →</a>
      </header>
      <div id="graph"></div>
      <aside id="inspect"><h2>inspect</h2><p style="color:var(--muted)">click a node</p></aside>
      <pre id="nowline"></pre>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
